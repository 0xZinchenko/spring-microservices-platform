server:
  port: 8080

spring:
  application:
    name: customer

  datasource:
    url: jdbc:postgresql://localhost:5432/customer
    username: zim4ik
    password: password

  jpa:
    show-sql: true
    hibernate:
      ddl-auto: create-drop
    properties:
      hibernate:
        format_sql: true
        dialect: org.hibernate.dialect.PostgreSQLDialect
  rabbitmq:
    host: localhost
    port: 5672
    username: guest
    password: guest

eureka:
  client:
    service-url:
      defaultZone: http://localhost:8761/eureka
    fetch-registry: true
    register-with-eureka: true
clients:
  fraud:
    url: ${FRAUD_URL:http://localhost:8081}
  notification:
    url: ${NOTIFICATION_URL:http://localhost:8082}

rabbitmq:
  exchange:
    internal: internal.exchange
  routing-key:
    internal-notification: internal.notification.routing-key